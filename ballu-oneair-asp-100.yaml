sensor:
  # GPIO34: штатный температурный датчик приточного воздуха.
  # По измерениям напряжение падает при росте температуры.
  # Датчик используется как температурный вход через калибровочную таблицу.
  # Сырой канал напряжения оставлен как диагностический сенсор.
  # attenuation фиксирован на 12db, потому что ESPHome не позволяет использовать attenuation: auto вместе с samples.
  - platform: adc
    id: temp_adc_voltage
    name: ${dev_name}_temperature_adc_voltage
    internal: true
    pin: ${temp_adc}
    attenuation: 12db
    samples: 16
    update_interval: 10s
    accuracy_decimals: 3
    unit_of_measurement: V
    entity_category: diagnostic
    disabled_by_default: true
    filters:
      - sliding_window_moving_average:
          window_size: 6
          send_every: 1

  # Основной температурный сенсор.
  # Сущность публикует текущую температуру приточного воздуха.
  # Калибровка построена по вашим точкам:
  # 1.03V=19C, 1.04V=18C, 0.64V=37C, 0.71V=32C,
  # 0.78V=29C, 0.90V=22C, 0.95V=21C, 0.99V=20C.
  - platform: template
    id: supply_air_temperature
    name: Temperature Current
    icon: "mdi:thermometer"
    device_class: temperature
    state_class: measurement
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    update_interval: 10s
    lambda: |-
      const float v = id(temp_adc_voltage).state;
      if (isnan(v) || v <= 0.05f || v >= 3.25f) {
        return NAN;
      }

      // Аппроксимация по измеренным точкам напряжения и температуры.
      // Модель: 1/Tk = A * ln(V / (3.3 - V)) + B
      // Коэффициенты A и B рассчитаны по калибровочной таблице выше.
      const float a = 0.0003162728f;
      const float b = 0.0036822819f;
      const float vs = 3.3f;

      const float ratio = v / (vs - v);
      if (ratio <= 0.0f) {
        return NAN;
      }

      const float tk = 1.0f / (a * logf(ratio) + b);
      return tk - 273.15f;
    on_value:
      then:
        - script.execute: heat_temperature_update

  - platform: template
    id: shutter_position_segments_sensor
    name: ${dev_name}_shutter_position_segments
    internal: true
    icon: "mdi:counter"
    accuracy_decimals: 0
    update_interval: 5s
    entity_category: diagnostic
    disabled_by_default: true
    lambda: |-
      return id(shutter_position_segments);

  - platform: template
    id: prefilter_runtime_hours_sensor
    name: Prefilter Runtime
    icon: "mdi:air-filter"
    unit_of_measurement: "h"
    accuracy_decimals: 1
    state_class: measurement
    update_interval: 60s
    lambda: |-
      return id(prefilter_runtime_seconds) / 3600.0f;

  - platform: template
    id: main_filter_runtime_hours_sensor
    name: Main Filter Runtime
    icon: "mdi:air-filter"
    unit_of_measurement: "h"
    accuracy_decimals: 1
    state_class: measurement
    update_interval: 60s
    lambda: |-
      return id(main_filter_runtime_seconds) / 3600.0f;

  - platform: pulse_width
    id: mhz19_pwm_high
    name: ${dev_name}_mhz19_pwm_high_raw
    internal: true
    pin: ${mhz19_pwm}
    update_interval: 10s
    unit_of_measurement: s
    entity_category: diagnostic

  - platform: template
    id: co2_pwm_estimate
    name: CO₂
    unit_of_measurement: ppm
    device_class: carbon_dioxide
    state_class: measurement
    accuracy_decimals: 1
    update_interval: 10s
    lambda: |-
      const float th_ms = id(mhz19_pwm_high).state * 1000.0f;
      if (isnan(th_ms) || th_ms <= 2.0f) return NAN;
      return (th_ms - 2.0f) * 5.0f;
    on_value:
      then:
        - script.execute: auto_co2_update


light:
  # Диагностический тест светодиодов панели.
  # Панель содержит 6 адресных светодиодов, подключённых цепочкой к GPIO17.
  # Базовая лента и её разделы управляют этими светодиодами.
  # Параметры chipset и rgb_order заданы для подтверждённой панели.
  - platform: esp32_rmt_led_strip
    id: oneair_panel_leds_raw
    name: ${dev_name}_panel_leds_raw
    internal: true
    pin: ${panel_led_data_pin}
    num_leds: ${panel_led_count}
    rgb_order: ${panel_led_rgb_order}
