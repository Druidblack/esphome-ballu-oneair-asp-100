      - script.execute: fan_all_off

  - platform: template
    name: ${dev_name}_heater_all_off
    internal: true
    icon: "mdi:heat-wave"
    entity_category: diagnostic
    on_press:
      - script.execute: heater_all_off

  - platform: template
    name: ${dev_name}_fan_apply_current_settings
    internal: true
    icon: "mdi:fan-sync"
    entity_category: diagnostic
    on_press:
      - script.execute: fan_apply_current_speed

  - platform: template
    name: ${dev_name}_shutter_open
    internal: true
