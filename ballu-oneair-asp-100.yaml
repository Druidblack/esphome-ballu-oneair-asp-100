      - script.execute: shutter_open_script

  - platform: template
    name: ${dev_name}_shutter_close
    internal: true
    icon: "mdi:window-shutter"
    entity_category: diagnostic
    on_press:
      - script.execute: shutter_close_script

  - platform: template
    name: ${dev_name}_shutter_25_open
    internal: true
    icon: "mdi:window-shutter-open"
    entity_category: diagnostic
    on_press:
      - script.execute: shutter_move_to_segment_1_script

  - platform: template
    name: ${dev_name}_shutter_75_open
    internal: true
    icon: "mdi:window-shutter-open"
    entity_category: diagnostic
    on_press:
      - script.execute: shutter_move_to_segment_2_script

  - platform: template
    name: ${dev_name}_shutter_stop
    internal: true
    icon: "mdi:stop"
    entity_category: diagnostic
    on_press:
      - script.execute: shutter_stop_script

  - platform: template
    name: ${dev_name}_shutter_test_open_100_steps
    internal: true
    icon: "mdi:debug-step-over"
    entity_category: diagnostic
    on_press:
      - stepper.report_position:
          id: shutter_stepper
          position: 0
      - stepper.set_target:
          id: shutter_stepper
          target: 100

  - platform: template
    name: ${dev_name}_shutter_test_close_100_steps
    internal: true
    icon: "mdi:debug-step-over"
    entity_category: diagnostic
    on_press:
      - stepper.report_position:
          id: shutter_stepper
          position: 0
      - stepper.set_target:
          id: shutter_stepper
          target: -100
